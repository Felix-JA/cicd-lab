<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lab CI/CD</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1a1a2e; color: #eee; }
        .card { background: #16213e; padding: 2rem; border-radius: 10px; text-align: center; border: 1px solid #0f3460; min-width: 300px; }
        h1 { color: #e94560; }
        #mensaje { color: #a8dadc; font-size: 1.2rem; margin: 1rem 0; }
        #estado { font-size: 0.9rem; color: #888; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        button:hover { background: #c73652; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lab CI/CD</h1>
        <p>Jenkins + Docker + Node.js</p>
        <div id="mensaje">Cargando...</div>
        <div id="estado"></div>
        <button onclick="fetchMensaje()">Actualizar</button>
    </div>
    <script>
        async function fetchMensaje() {
            document.getElementById('mensaje').textContent = 'Cargando...';
            try {
                const res = await fetch('/api/message');
                const data = await res.json();
                document.getElementById('mensaje').textContent = data.message;
                document.getElementById('estado').textContent = 'Última actualización: ' + new Date(data.timestamp).toLocaleTimeString();
            } catch (err) {
                document.getElementById('mensaje').textContent = 'Error conectando al backend';
                document.getElementById('estado').textContent = err.message;
            }
        }
        fetchMensaje();
    </script>
</body>
</html>
